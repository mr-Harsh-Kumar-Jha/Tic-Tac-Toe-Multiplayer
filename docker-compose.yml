services:

  plugin-builder:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - plugin_modules:/out
    entrypoint: ["sh", "-c", "cp -f /backend/modules/tictactoe.so /out/tictactoe.so && echo 'Plugin copied to volume successfully!'"]

  nakama:
    image: heroiclabs/nakama:3.38.0
    container_name: nakama-server
    entrypoint:
      - "/bin/sh"
      - "-c"
      - >
        /nakama/nakama migrate up
        --database.address "postgres://koyeb-adm:npg_oNAY4CK3hlWq@ep-purple-meadow-agqjhas5.c-2.eu-central-1.pg.koyeb.app/koyebdb" &&
        /nakama/nakama
        --name nakama-tictactoe
        --database.address "postgres://koyeb-adm:npg_oNAY4CK3hlWq@ep-purple-meadow-agqjhas5.c-2.eu-central-1.pg.koyeb.app/koyebdb"
        --logger.level INFO
        --session.encryption_key "s3cr3tsession"
        --session.refresh_encryption_key "s3cr3trefresh"
        --console.signing_key "s3cr3tsigning"
        --socket.server_key "s3cr3tserver"
        --runtime.path "/nakama/modules"
        --console.port 7351
        --socket.port 7350
    ports:
      - "7350:7350"
      - "7351:7351"
      - "7349:7349"
    volumes:
      - plugin_modules:/nakama/modules
    mem_limit: 1g

volumes:
  plugin_modules: